            - heading "Built for Your Career, Not Just a Line on Your Résumé" [level=2] [ref=e322]
            - generic [ref=e323]:
              - paragraph [ref=e324]: SCLA pairs academic recognition with real career tools—AI‑powered resources, accredited programs and direct access to industry leaders—so you can accelerate your career and build a future that matters.
              - list [ref=e325]:
                - listitem [ref=e326]:
                  - strong [ref=e327]: "Develop Skills:"
                  - text: AI Career Hub with résumé builder and guided career chats; an accredited Career Readiness Certification; certifications from leaders like Google and Microsoft (coming soon); and the ISPI strengths assessment (a $150 value).
                - listitem [ref=e328]:
                  - strong [ref=e329]: "Expand Opportunities:"
                  - text: Scholarship opportunities, personalized
                  - strong [ref=e330]
                  - text: letters of recommendation upon certification, a growing employer network and the ability to earn college credit (how credits apply varies by campus).
                - listitem [ref=e331]:
                  - strong [ref=e332]: "Build Connections:"
                  - text: Smart networking via AI‑powered peer matching, access to C‑suite voices through the CEO Speaker Series and a nationwide community across 850+ campuses and 125,000+ members.
            - link "Learn more" [ref=e334] [cursor=pointer]:
              - /url: https://www.thescla.org/benefits?hsLang=en
              - text: Learn more
