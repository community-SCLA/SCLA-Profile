# ─────────────────────────────────────────────────────────────────────────────
# template-cleanup.yml — optional, manual-trigger workflow
#
# WHAT IT DOES:
#   Wipes placeholder values in client.config.yml and any leftover files in
#   client/{knowledge-base,brand,workflows,source-of-truth}/ that shouldn't
#   exist in a fresh client repo. Then deletes itself so it can't run twice.
#
# WHEN TO USE:
#   Right after you create a new repo from this template — before you start
#   filling in client.config.yml. Think of it as "factory reset" for the
#   per-client copy.
#
# WHY IT'S OPTIONAL:
#   The template is kept clean by convention (TEMPLATE.md enforces "no client
#   data in the template"). This workflow is a safety net if something slipped
#   through, or if you're bootstrapping from a repo that did accumulate
#   placeholder examples.
#
# HOW TO TRIGGER:
#   In GitHub UI: Actions tab → "Template cleanup" → Run workflow.
#   It runs once, cleans up, and removes itself from the repo.
#
# HOW TO DISABLE:
#   Just delete this file. It's inert unless you trigger it manually.
# ─────────────────────────────────────────────────────────────────────────────

name: Template cleanup

on:
  workflow_dispatch:  # manual only — will NOT run on every push

jobs:
  cleanup:
    # Safety: don't run in the template repo itself.
    # Rename the template if this doesn't match your org.
    if: github.repository != 'community-SCLA/client-onboarding'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Reset client.config.yml placeholders
        run: |
          if [[ -f client.config.yml ]]; then
            # Clear the two required identity fields so the operator is
            # forced to fill them in.
            sed -i 's/^  name: .*/  name: ""/' client.config.yml
            sed -i 's/^  slug: .*/  slug: ""/' client.config.yml
          fi

      - name: Remove any leftover per-client outputs
        run: |
          # Keep the README stubs; remove anything else an earlier client
          # might have left behind.
          find client/knowledge-base -type f ! -name 'README.md' -delete || true
          find client/brand -type f ! -name 'README.md' ! -path '*/assets/*' -delete || true
          find client/workflows -type f ! -name 'README.md' -delete || true
          find client/source-of-truth -type f ! -name 'README.md' -delete || true

          # Wipe raw scraped content (but keep the inbox/ scaffolding)
          find client/_raw/web -mindepth 1 -delete || true
          find client/_raw/assets -mindepth 1 -delete || true
          find client/_raw/docs -mindepth 1 ! -path 'client/_raw/docs/inbox*' -delete || true
          find client/_raw/artifacts -mindepth 1 ! -path 'client/_raw/artifacts/inbox*' -delete || true

          # Reset manifest
          cat > client/_raw/MANIFEST.md <<'EOF'
          # Ingest Manifest

          One row per file ingested. Append-only. Written by the `ingestor` agent.

          | Date | Source | Local Path | Bytes |
          |---|---|---|---|
          | _—_ | _no ingest runs yet_ | _—_ | _—_ |
          EOF

      - name: Self-destruct this workflow
        run: |
          git config user.name "template-cleanup[bot]"
          git config user.email "template-cleanup@users.noreply.github.com"
          rm .github/workflows/template-cleanup.yml
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — repo was already clean."
          else
            git commit -m "chore: factory-reset from template + remove cleanup workflow"
            git push
          fi
