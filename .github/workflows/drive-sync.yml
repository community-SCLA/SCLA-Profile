name: Drive sync (Git → Google Drive)

# One-way mirror: Git is the source of truth, Google Drive follows.
# On every push to main that touches a curated content folder, convert the curated
# Markdown to .docx and rclone-sync it into a Drive folder, where each .docx imports
# as a Google Doc. Editing the synced Docs in Drive does NOT flow back — those edits
# are overwritten on the next run. See decisions/log.md and references/google-drive-api.md.

on:
  push:
    branches: [main]
    paths:
      - 'brand/**'
      - 'context/**'
      - 'member-support/**'
      - 'operations/**'
      - 'partnerships/**'
      - 'programs/**'
      - 'projects/**'
      - 'decisions/**'
      - 'references/**'
      - 'templates/**'
      - 'scripts/build-docx.sh'
      - '.github/workflows/drive-sync.yml'
  workflow_dispatch:        # allow manual runs (e.g. first end-to-end test)
    inputs:
      dry_run:
        description: 'Preview changes without writing to Drive'
        type: boolean
        default: false

concurrency:
  group: drive-sync          # never let two syncs race on the same Drive folder
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc rclone

      - name: Build .docx from curated Markdown
        run: scripts/build-docx.sh build

      - name: Write rclone config from secret
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Sync build/ to Google Drive
        env:
          # Remote name (e.g. "gdrive") and target subfolder. Stored as a repo variable,
          # human-readable copy lives in endpoints.md. Form: "gdrive:SCLA-Profile".
          GDRIVE_TARGET: ${{ vars.GDRIVE_TARGET }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ -z "$GDRIVE_TARGET" ]; then
            echo "❌ vars.GDRIVE_TARGET is not set (e.g. gdrive:SCLA-Profile)." >&2
            exit 1
          fi
          extra=""
          if [ "$DRY_RUN" = "true" ]; then extra="--dry-run"; fi
          rclone sync build/ "$GDRIVE_TARGET/" \
            --drive-import-formats docx \
            --drive-use-trash \
            --create-empty-src-dirs \
            --verbose $extra
