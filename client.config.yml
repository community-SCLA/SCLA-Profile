
client:
  name: "The Society for Collegiate Leadership & Achievement"
  slug: "the-scla"
  industry: "higher education / education services industry"                   
  primary_contact:
    name: ""
    email: ""
    role: ""
    website: "https://www.thescla.org"

# ─────────────────────────────────────────────────────────────────────────────
# SOURCES — where the client's information currently lives.
# The `ingestor` agent reads this list and populates client/_raw/.
# ─────────────────────────────────────────────────────────────────────────────
sources:
  # Public web properties (the ingestor will crawl + snapshot these to markdown)
  websites:
    - url: "https://www.thescla.org"
      crawl_depth: 2              # 0 = single page, 2 = default
      include_assets: true        # download logos, images, PDFs linked from pages

  # Documents (paths relative to client/_raw/docs/inbox/, or direct URLs)
  docs:
    - path: "inbox/"              # drop files here before running /ingest
    - url: ""                     # public Google Doc / Notion / PDF URL

  # Code repositories (optional — surfaces README + architecture signals)
  repos: []
    # - url: "https://github.com/client/app"

  # Shared drives / workspaces (manual export recommended; list for tracking)
  drives: []
    # - label: "Google Drive — Marketing"
    #   export_path: "inbox/drive-marketing-export.zip"

  # Workflow artifacts (Slack exports, ticket dumps, Looms, meeting notes)
  # NOTE: files below were loaded manually into _raw/artifacts/inbox/ on 2026-04-24
  artifacts:
    - label: "Community Team Mondays — 2026-04-06 (Gemini notes)"
      path: "inbox/Copy of Community Team Mondays - 2026_04_06 15_56 CDT - Notes by Gemini.md"
    - label: "Community Team Mondays — 2026-04-13 (Gemini notes)"
      path: "inbox/Copy of Community Team Mondays - 2026_04_13 15_55 CDT - Notes by Gemini.md"
    - label: "Community Team Mondays — 2026-04-20 (Gemini notes)"
      path: "inbox/Community Team Mondays - 2026_04_20 16_00 CDT - Notes by Gemini.md"
    - label: "Stakeholder tooling inventory"
      path: "inbox/stakeholder-notes.md"

# ─────────────────────────────────────────────────────────────────────────────
# TARGETS — what you want at the end of onboarding.
# Toggle stages off to skip them.
# ─────────────────────────────────────────────────────────────────────────────
targets:
  knowledge_base: true
  brand_guide: true
  workflow_map: true
  automation_opportunities: true
  source_of_truth: true

# ─────────────────────────────────────────────────────────────────────────────
# COLLAB — where the finished source of truth will live for the client's team.
# (Used by `source-of-truth-curator` to generate a README pointing there.)
# ─────────────────────────────────────────────────────────────────────────────
collab:
  canonical_home: ""              # e.g. "Notion workspace URL" or "internal wiki"
  channels:
    - name: "slack"
      handle: ""                  # e.g. "#client-acme"
