<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"kicker","type":"string","label":"Kicker / eyebrow label","default":"The shift"},
    {"id":"statement","type":"string","label":"Statement line (a program thesis — NOT a quote)","default":"Better decisions become possible when you shift from pressure to process."},
    {"id":"lines","type":"string","label":"Supporting bullet lines under the statement, pipe-separated (empty = none). Prefix a line with \"» \" to make it an indented continuation of the point above (no bullet).","default":""},
    {"id":"pointCues","type":"string","label":"Per-supporting-line reveal times, local sec, comma-separated (compiler-owned)","default":""},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"03 / STATEMENT"},
    {"id":"theme","type":"string","label":"Style package (summit | horizon | cadence)","default":"summit"},
    {"id":"sceneDuration","type":"string","label":"Scene duration in seconds (compiler-maintained; times the late-phase resolve)","default":"10"},
    {"id":"icon","type":"string","label":"Optional living icon name (see frame.md icon library; empty = none)","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <!--
      STATEMENT CARD — use for a bold thesis line authored by SCLA or the program.
      This is NOT a quote: no quotation glyph, no person attribution. If the line is
      attributed to a named human, use scla-quote.html instead. (frame.md → "Scene
      index & numerals" → "Quotes are for humans; program lines are statements".)
    -->
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", system-ui, sans-serif;
        }
        .sm-bg {
          position: absolute;
          inset: 0;
          background: radial-gradient(120% 140% at 30% 40%, #0d2437 0%, #0a1e2f 80%);
        }
        .sm-ring {
          position: absolute;
          border-radius: 50%;
        }
        #sm-ring-1 { right: -280px; bottom: -320px; width: 820px; height: 940px; border: 3px solid rgba(51, 147, 214, 0.32); }
        #sm-ring-2 { right: -190px; bottom: -240px; width: 620px; height: 720px; border: 2px solid rgba(234, 171, 45, 0.26); }
        #sm-ring-3 { right: -110px; bottom: -170px; width: 440px; height: 520px; border: 2px solid rgba(255, 255, 255, 0.14); }
        .sm-corner {
          position: absolute;
          width: 34px;
          height: 34px;
          border: 3px solid rgba(255, 255, 255, 0.24);
        }
        #sm-corner-tl { left: 60px; top: 60px; border-right: none; border-bottom: none; }
        #sm-corner-br { right: 60px; bottom: 60px; border-left: none; border-top: none; }
        #sm-block {
          position: absolute;
          left: 120px;
          top: 300px;
          width: 1500px;
        }
        #sm-rule {
          width: 148px;
          height: 4px;
          background: #eaab2d;
          transform-origin: left center;
        }
        #sm-kicker {
          margin-top: 26px;
          font-size: 26px;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          color: #eaab2d;
        }
        #sm-statement {
          margin-top: 28px;
          font-size: 72px;
          line-height: 1.16;
          font-weight: 900;
          color: #ffffff;
          text-wrap: balance;
        }
        .sm-word {
          display: inline-block;
          transform-origin: 50% 80%;
        }
        #sm-underline {
          margin-top: 40px;
          width: 460px;
          height: 3px;
          background: rgba(51, 147, 214, 0.65);
          transform-origin: left center;
        }
        /* Supporting lines (opt-in via `lines`): one balanced left-aligned column that sits
           right under the statement regardless of wrap count (never stranded at the bottom).
           A rationed gold dot marks each new point; a line authored with a leading "» " is a
           wrapped continuation of the point above — no dot, text indented to align under it. */
        #sm-lines { margin-top: 40px; }
        .sm-line { display: flex; align-items: flex-start; gap: 24px; font-size: 48px; font-weight: 400; line-height: 1.38; color: #bcd3e4; margin-bottom: 20px; }
        .sm-line .bull { flex: 0 0 16px; width: 16px; height: 16px; margin-top: 18px; border-radius: 50%; background: #eaab2d; }
        .sm-line.cont .bull { background: transparent; }
        .sm-line .txt { flex: 1 1 auto; }
        #sm-index {
          position: absolute;
          right: 120px;
          bottom: 58px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: rgba(188, 211, 228, 0.7);
        }
        #sm-brandline {
          position: absolute;
          left: 120px;
          bottom: 58px;
          font-size: 19px;
          font-weight: 700;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: rgba(188, 211, 228, 0.55);
        }
        /* Optional living-icon hero on the right (opt-in via `icon`; frame.md → "Living
           icon library"). Absent by default — statement scenes without an icon are
           unchanged. When present the text block narrows to reserve the right column. */
        #sm-iconwrap { position: absolute; left: 1400px; top: 392px; width: 300px; height: 300px; display: none; }
        #sm-iconwrap svg { width: 300px; height: 300px; }
        #root[data-has-icon="1"] #sm-block { width: 1180px; }
        /* Style packages (frame.md "Style packages") — visual layer only; timeline identical */
        #root[data-theme="horizon"] .sm-bg { background: radial-gradient(140% 120% at 50% 92%, #0d2437 0%, #0a1e2f 76%); }
        #root[data-theme="horizon"] #sm-ring-1 { right: auto; bottom: auto; left: -280px; top: -340px; border-color: rgba(51, 147, 214, 0.3); }
        #root[data-theme="horizon"] #sm-ring-2 { right: auto; bottom: auto; left: -190px; top: -250px; border-color: rgba(255, 255, 255, 0.16); }
        #root[data-theme="horizon"] #sm-ring-3 { right: auto; bottom: auto; left: -110px; top: -170px; border-color: rgba(51, 147, 214, 0.2); }
        #root[data-theme="horizon"] #sm-rule { background: #3393d6; }
        #root[data-theme="horizon"] #sm-kicker { color: #bcd3e4; }
        #root[data-theme="horizon"] #sm-underline { background: rgba(234, 171, 45, 0.55); }
        #root[data-theme="horizon"] .sm-corner { border-color: rgba(51, 147, 214, 0.4); }
        #root[data-theme="horizon"] .sm-line .bull { background: #3393d6; }
        #root[data-theme="horizon"] .sm-line.cont .bull { background: transparent; }
        #root[data-theme="cadence"] .sm-bg { background: radial-gradient(130% 130% at 78% 18%, #0d2437 0%, #0a1e2f 74%); }
        #root[data-theme="cadence"] .sm-bg::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 14px; background: #eaab2d; }
        #root[data-theme="cadence"] #sm-ring-1 { border-color: rgba(234, 171, 45, 0.32); }
        #root[data-theme="cadence"] #sm-ring-3 { border-color: rgba(234, 171, 45, 0.22); }
        #root[data-theme="cadence"] #sm-rule { width: 220px; }
        #root[data-theme="cadence"] #sm-underline { background: #eaab2d; }
        #root[data-theme="cadence"] .sm-corner { border-color: rgba(234, 171, 45, 0.5); }
      </style>

      <div id="root" data-composition-id="scla-statement" data-width="1920" data-height="1080" data-duration="8">
        <div class="sm-bg"></div>
        <div class="sm-ring" id="sm-ring-1" data-layout-allow-overflow></div>
        <div class="sm-ring" id="sm-ring-2" data-layout-allow-overflow></div>
        <div class="sm-ring" id="sm-ring-3" data-layout-allow-overflow></div>
        <div class="sm-corner" id="sm-corner-tl"></div>
        <div class="sm-corner" id="sm-corner-br"></div>
        <div id="sm-block">
          <div id="sm-rule"></div>
          <div id="sm-kicker">The shift</div>
          <h2 id="sm-statement">Better decisions become possible when you shift from pressure to process.</h2>
          <div id="sm-underline"></div>
          <div id="sm-lines"></div>
        </div>
        <div id="sm-iconwrap" data-layout-allow-overflow><svg viewBox="0 0 96 96" fill="none"></svg></div>
        <div id="sm-brandline">SCLA · Lesson System</div>
        <div id="sm-index" data-layout-allow-occlusion>03 / STATEMENT</div>
      </div>

      <script>
        (function () {
          const defaults = {
            kicker: "The shift",
            statement: "Better decisions become possible when you shift from pressure to process.",
            lines: "",
            pointCues: "",
            sceneIndex: "03 / STATEMENT",
            theme: "summit",
            sceneDuration: "10",
            icon: "",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("root").setAttribute("data-theme", vars.theme || "summit");
          document.getElementById("sm-kicker").textContent = vars.kicker;
          document.getElementById("sm-index").textContent = vars.sceneIndex;

          // Statement is split into word spans for layout parity with earlier
          // cuts (the reading-ripple animation that used them was removed
          // 2026-07-14 and again 2026-07-15; the spans are purely structural).
          const stmtEl = document.getElementById("sm-statement");
          stmtEl.textContent = "";
          const wordEls = [];
          String(vars.statement).split(/\s+/).forEach(function (w, i) {
            if (!w) return;
            if (wordEls.length) stmtEl.appendChild(document.createTextNode(" "));
            const span = document.createElement("span");
            span.className = "sm-word";
            // Overlap permission retained; the reading ripple that needed it was removed.
            span.setAttribute("data-layout-allow-overlap", "");
            span.textContent = w;
            stmtEl.appendChild(span);
            wordEls.push(span);
          });

          // Supporting lines (opt-in). Each renders as a gold-bullet point; a "» " prefix
          // makes it an indented continuation (no bullet) of the point above. When any lines
          // are present the decorative underline stands down — the lines are the content
          // that develops the frame instead.
          const lines = String(vars.lines || "").split("|").map(function (s) { return s.trim(); }).filter(Boolean);
          const lineCues = String(vars.pointCues || "").split(",").map(function (s) { return parseFloat(s); }).filter(function (v) { return !isNaN(v); });
          const lineEls = [];
          const lineHost = document.getElementById("sm-lines");
          if (lines.length) document.getElementById("sm-underline").style.display = "none";
          lines.forEach(function (t) {
            const cont = /^»\s*/.test(t);
            const text = t.replace(/^»\s*/, "");
            const row = document.createElement("div");
            row.className = cont ? "sm-line cont" : "sm-line";
            const bull = document.createElement("span");
            bull.className = "bull";
            const txt = document.createElement("span");
            txt.className = "txt";
            txt.textContent = text;
            row.appendChild(bull);
            row.appendChild(txt);
            lineHost.appendChild(row);
            lineEls.push(row);
          });

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          // Furniture paints at t=0 (frame.md — no bare first frame at a cut).
          tl.fromTo("#sm-ring-1", { opacity: 0.5, scale: 0.97 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0);
          tl.fromTo("#sm-ring-2", { opacity: 0.5, scale: 0.96 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0.15);
          tl.fromTo("#sm-ring-3", { opacity: 0.5, scale: 0.96 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0.3);
          tl.fromTo(["#sm-corner-tl", "#sm-corner-br"], { opacity: 0.55 }, { opacity: 1, duration: 0.5, ease: "power1.out" }, 0);
          tl.fromTo("#sm-rule", { scaleX: 0 }, { scaleX: 1, duration: 0.55, ease: "power3.out" }, 0.3);
          tl.fromTo("#sm-kicker", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.45);
          // Second beat: the statement resolves upward with a clip reveal so the frame
          // is still developing after the entrance — not a static hold.
          tl.fromTo(
            "#sm-statement",
            { opacity: 0, y: 60, clipPath: "inset(0% 0% 100% 0%)" },
            { opacity: 1, y: 0, clipPath: "inset(0% 0% 0% 0%)", duration: 0.95, ease: "power4.out" },
            0.65,
          );
          if (!lines.length) tl.fromTo("#sm-underline", { scaleX: 0 }, { scaleX: 1, duration: 0.7, ease: "power3.out" }, 1.5);
          // Supporting lines resolve one per spoken cue (a real staged beat covering the hold —
          // never in-place re-animation of settled text).
          lineEls.forEach(function (el, i) {
            const at = i < lineCues.length ? lineCues[i] : 1.4 + i * 1.2;
            tl.fromTo(el, { opacity: 0, x: 36 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, at);
          });
          tl.fromTo(["#sm-index", "#sm-brandline"], { opacity: 0.55 }, { opacity: 1, duration: 0.6, ease: "power1.out" }, 0);
          // Ambient breath (finite, seek-safe) keeps the decorative layer alive.
          tl.fromTo("#sm-ring-1", { scale: 1 }, { scale: 1.05, duration: 3.2, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.6);
          tl.fromTo("#sm-ring-2", { scale: 1 }, { scale: 1.04, duration: 2.8, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.9);
          // Depth-drift parallax (promoted 2026-07-14; re-tuned 2026-07-15): the ghost
          // rings drift at different rates — translate-only decorative parallax in
          // finite sine yoyo cycles sized to register at QA frame sampling. (The
          // promoted single whole-scene glide moved ~1px/s — pixel-identical between
          // 0.5s samples — and stagnated every long hold: render regression 2026-07-15.)
          const sdur = Math.max(4, Number(vars.sceneDuration) || 10);
          const drift = function (sel, ax, ay, per) {
            tl.fromTo(sel, { x: 0, y: 0 }, { x: ax, y: ay, duration: per, ease: "sine.inOut",
              yoyo: true, repeat: Math.max(1, Math.ceil(sdur / per) - 1) }, 0);
          };
          // Amplitude raised 2026-07-15 to the QA-registering band (owner-approved,
          // matches the scla-chips fix): 16–30px moved <1 gray level per 48×27 QA
          // thumbnail px → read static at frame sampling. ~110/70px clears it.
          drift("#sm-ring-1", 120, 72, 3.4);
          drift("#sm-ring-2", -100, -52, 2.9);
          drift("#sm-ring-3", 70, 44, 2.5);
          // Optional living-icon hero (opt-in via `icon`; owner decision 2026-07-15 —
          // living icons may appear on single-focus statement beats, still sparing and
          // drawn on the cue). Geometry MIRRORED from scla-condition.html's ICONS map
          // (the canonical source; frame.md → "Living icon library" — keep in sync).
          // Navy canvas → white main stroke, gold accents/dots pop last.
          const iconName = String(vars.icon || "").trim();
          if (iconName) {
            const RING = "M 48 16 A 32 32 0 1 1 48 80 A 32 32 0 1 1 48 16 Z";
            const ICONS = {
              compass: { paths: [{ d: RING }, { d: "M37 59 L54 42", gd: true }, { d: "M59 37 L52 44 L55 47 Z", gd: true }], circles: [{ cx: 48, cy: 48, r: 3.5, fill: true }] },
              pressure: { paths: [{ d: RING }, { d: "M48 48 L48 28" }, { d: "M48 48 L63 55", gd: true }], circles: [{ cx: 48, cy: 48, r: 3.5, fill: true }] },
              insight: { paths: [{ d: "M 48 22 A 18 18 0 1 1 48 58 A 18 18 0 1 1 48 22 Z" }, { d: "M40 55 L56 55" }, { d: "M43 61 L53 61" }, { d: "M42 43 L48 36 L54 43", gd: true }], circles: [] },
              salary: { paths: [{ d: "M26 46 L46 26 L70 26 L70 50 L50 70 Z" }], circles: [{ cx: 58, cy: 38, r: 5, gd: true }] },
              mentorship: { paths: [{ d: "M20 70 Q36 52 52 70" }, { d: "M50 72 Q64 56 78 72", gd: true }], circles: [{ cx: 36, cy: 34, r: 10 }, { cx: 64, cy: 40, r: 9, gd: true }] },
              mentorship2: { paths: [{ d: "M20 70 Q36 52 52 70", gd: true }, { d: "M50 72 Q64 56 78 72" }], circles: [{ cx: 36, cy: 34, r: 9, gd: true }, { cx: 64, cy: 40, r: 10 }] },
              growth: { paths: [{ d: "M22 74 L22 22" }, { d: "M22 74 L76 74" }, { d: "M28 62 L42 50 L54 56 L72 32" }, { d: "M62 32 L72 32 L72 42", gd: true }], circles: [] },
              target: { paths: [{ d: RING }, { d: "M 48 28 A 20 20 0 1 1 48 68 A 20 20 0 1 1 48 28 Z" }], circles: [{ cx: 48, cy: 48, r: 8, gd: true, fill: true }] },
              question: { paths: [{ d: RING }, { d: "M39 40 Q39 30 48 30 Q58 30 58 40 Q58 48 48 51 L48 56", gd: true }], circles: [{ cx: 48, cy: 65, r: 3.2, gd: true, fill: true }] },
              examine: { paths: [{ d: "M 48 12 A 22 22 0 1 1 48 56 A 22 22 0 1 1 48 12 Z" }, { d: "M58 58 L76 76", gd: true }], circles: [] },
              done: { paths: [{ d: RING }, { d: "M34 49 L44 60 L64 37", gd: true }], circles: [] },
            };
            const ic = ICONS[iconName];
            if (ic) {
              const svg = document.querySelector("#sm-iconwrap svg");
              const strokeMain = "#ffffff"; // statement canvas is always navy
              const draws = [], dots = [];
              (ic.paths || []).forEach(function (p) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", "path");
                el.setAttribute("d", p.d); el.setAttribute("fill", "none");
                el.setAttribute("stroke", p.gd ? "#eaab2d" : strokeMain);
                el.setAttribute("stroke-width", "4"); el.setAttribute("stroke-linecap", "round"); el.setAttribute("stroke-linejoin", "round");
                el.setAttribute("pathLength", "100"); svg.appendChild(el); draws.push(el);
              });
              (ic.circles || []).forEach(function (c) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                el.setAttribute("cx", c.cx); el.setAttribute("cy", c.cy); el.setAttribute("r", c.r);
                if (c.fill) { el.setAttribute("fill", c.gd ? "#eaab2d" : strokeMain); el.setAttribute("stroke", "none"); dots.push(el); }
                else { el.setAttribute("fill", "none"); el.setAttribute("stroke", c.gd ? "#eaab2d" : strokeMain); el.setAttribute("stroke-width", "4"); el.setAttribute("pathLength", "100"); draws.push(el); }
                svg.appendChild(el);
              });
              document.getElementById("root").setAttribute("data-has-icon", "1");
              document.getElementById("sm-iconwrap").style.display = "block";
              if (draws.length) tl.fromTo(draws, { strokeDasharray: "100 100", strokeDashoffset: 100 }, { strokeDashoffset: 0, duration: 0.55, ease: "power3.out", stagger: 0.13 }, 0.7);
              if (dots.length) tl.fromTo(dots, { scale: 0, transformOrigin: "center" }, { scale: 1, duration: 0.4, ease: "back.out(2)" }, 1.4);
              // Ambient bob on the HTML wrapper (translate-only, never scale + SVG-opacity).
              tl.fromTo("#sm-iconwrap", { x: 0, y: 0 }, { x: 0, y: -10, duration: 2.7, ease: "sine.inOut", yoyo: true, repeat: Math.max(1, Math.ceil(sdur / 2.7) - 1) }, 0);
            }
          }
          // (No reading ripple, late-phase resolve, or any in-place motion of the
          // settled statement/underline — owner decision 2026-07-14, REAFFIRMED
          // 2026-07-15 after an unauthorized restoration shipped in rendered cuts.
          // Long holds are covered by staged beats: supporting `lines`, a shorter
          // statement, or a scene split — never by re-animating settled text.)
          window.__timelines["scla-statement"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
