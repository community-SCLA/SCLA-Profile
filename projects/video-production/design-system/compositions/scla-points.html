<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"label","type":"string","label":"Section label","default":"Why decisions feel hard"},
    {"id":"heading","type":"string","label":"Heading","default":"Four pressure traps"},
    {"id":"point1","type":"string","label":"Point 1","default":"Deciding under pressure"},
    {"id":"point2","type":"string","label":"Point 2","default":"Comparing yourself to others"},
    {"id":"point3","type":"string","label":"Point 3","default":"Fixating on one factor, like salary or prestige"},
    {"id":"point4","type":"string","label":"Point 4 (empty to hide)","default":"Staying the course only because of sunk costs"},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"02 / KEY POINTS"},
    {"id":"theme","type":"string","label":"Style package (summit | horizon | cadence)","default":"summit"},
    {"id":"subBeats","type":"string","label":"Sub-beats — narration-synced live line, pipe-separated (empty = off)","default":""},
    {"id":"subCues","type":"string","label":"Per-sub-beat reveal times, local sec, comma-separated (compiler-owned)","default":""},
    {"id":"sceneDuration","type":"string","label":"Scene duration in seconds (compiler-maintained; times the late-phase resolve)","default":"10"},
    {"id":"pointCues","type":"string","label":"Per-point reveal times, local sec, comma-separated (empty = default spread)","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", system-ui, sans-serif;
        }
        .kp-bg {
          position: absolute;
          inset: 0;
          background: #f6f6f9;
          background-image:
            linear-gradient(rgba(51, 147, 214, 0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(51, 147, 214, 0.07) 1px, transparent 1px);
          background-size: 120px 120px;
        }
        #kp-ghost-ring {
          position: absolute;
          left: -320px;
          bottom: -380px;
          width: 900px;
          height: 1020px;
          border-radius: 50%;
          border: 3px solid rgba(51, 147, 214, 0.16);
        }
        #kp-ghost-ring-2 {
          position: absolute;
          left: -220px;
          bottom: -300px;
          width: 660px;
          height: 780px;
          border-radius: 50%;
          border: 2px solid rgba(234, 171, 45, 0.2);
        }
        #kp-rail {
          position: absolute;
          right: 84px;
          top: 120px;
          bottom: 120px;
          width: 2px;
          background: #cccedf;
          transform-origin: center top;
        }
        #kp-rail-label {
          position: absolute;
          right: 44px;
          top: 120px;
          font-size: 19px;
          font-weight: 700;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #5f6f96;
          writing-mode: vertical-rl;
        }
        #kp-head {
          position: absolute;
          left: 120px;
          top: 110px;
          width: 1400px;
        }
        #kp-label-row {
          display: flex;
          align-items: center;
          gap: 18px;
        }
        #kp-tick {
          width: 46px;
          height: 4px;
          background: #eaab2d;
          transform-origin: left center;
        }
        #kp-label {
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          color: #3393d6;
        }
        #kp-heading {
          margin-top: 18px;
          font-size: 68px;
          font-weight: 900;
          color: #0d2437;
          line-height: 1.08;
        }
        #kp-list {
          position: absolute;
          left: 120px;
          top: 370px;
          width: 1480px;
          display: flex;
          flex-direction: column;
        }
        .kp-item {
          display: flex;
          align-items: center;
          gap: 36px;
          padding: 30px 0;
          border-bottom: 2px solid #cccedf;
        }
        .kp-num {
          flex: none;
          width: 74px;
          height: 74px;
          border-radius: 50%;
          background: #eaab2d;
          color: #0d2437;
          font-size: 32px;
          font-weight: 900;
          display: grid;
          place-items: center;
        }
        .kp-text {
          font-size: 36px;
          font-weight: 400;
          color: #292f35;
        }
        #kp-index {
          position: absolute;
          right: 120px;
          bottom: 58px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        /* Sub-beats — narration-synced live line (dead-hold fix, 2026-07-14).
           One beat visible at a time; absent unless subBeats is set. */
        .kp-subbeat {
          position: absolute;
          left: 160px;
          right: 160px;
          bottom: 132px;
          text-align: center;
          font-size: 30px;
          font-weight: 700;
          color: #0d2437;
          opacity: 0;
        }
        /* Style packages (frame.md "Style packages") — visual layer only; timeline identical */
        #root[data-theme="horizon"] .kp-bg { background: #ffffff; background-image: radial-gradient(rgba(51, 147, 214, 0.12) 2px, transparent 2px); background-size: 72px 72px; }
        #root[data-theme="horizon"] #kp-ghost-ring { left: auto; bottom: auto; right: -320px; top: -420px; border-color: rgba(51, 147, 214, 0.14); }
        #root[data-theme="horizon"] #kp-ghost-ring-2 { left: auto; bottom: auto; right: -200px; top: -320px; border-color: rgba(234, 171, 45, 0.16); }
        #root[data-theme="horizon"] #kp-tick { background: #3393d6; }
        #root[data-theme="horizon"] .kp-num { background: #ffffff; border: 3px solid #3393d6; color: #0d2437; }
        #root[data-theme="cadence"] .kp-bg { background: #ffffff; background-image: linear-gradient(rgba(51, 147, 214, 0.09) 1px, transparent 1px), linear-gradient(90deg, rgba(51, 147, 214, 0.09) 1px, transparent 1px); background-size: 96px 96px; }
        #root[data-theme="cadence"] #kp-tick { width: 70px; }
        #root[data-theme="cadence"] .kp-num { background: #0d2437; color: #eaab2d; }
        #root[data-theme="cadence"] #kp-rail { background: #eaab2d; }
        #root[data-theme="cadence"] .kp-item { border-bottom-color: #e5eff6; }
      </style>

      <div id="root" data-composition-id="scla-points" data-width="1920" data-height="1080" data-duration="8">
        <div class="kp-bg"></div>
        <div id="kp-ghost-ring" data-layout-allow-overflow></div>
        <div id="kp-ghost-ring-2" data-layout-allow-overflow></div>
        <div id="kp-rail"></div>
        <div id="kp-rail-label">SCLA · Lesson System</div>
        <div id="kp-head">
          <div id="kp-label-row">
            <div id="kp-tick"></div>
            <div id="kp-label">Why decisions feel hard</div>
          </div>
          <h2 id="kp-heading">Four pressure traps</h2>
        </div>
        <div id="kp-list">
          <div class="kp-item" id="kp-item-1">
            <div class="kp-num">1</div>
            <div class="kp-text" id="kp-text-1">Deciding under pressure</div>
          </div>
          <div class="kp-item" id="kp-item-2">
            <div class="kp-num">2</div>
            <div class="kp-text" id="kp-text-2">Comparing yourself to others</div>
          </div>
          <div class="kp-item" id="kp-item-3">
            <div class="kp-num">3</div>
            <div class="kp-text" id="kp-text-3">Fixating on one factor, like salary or prestige</div>
          </div>
          <div class="kp-item" id="kp-item-4">
            <div class="kp-num">4</div>
            <div class="kp-text" id="kp-text-4">Staying the course only because of sunk costs</div>
          </div>
        </div>
        <div id="kp-index">02 / KEY POINTS</div>
      </div>

      <script>
        (function () {
          const defaults = {
            label: "Why decisions feel hard",
            heading: "Four pressure traps",
            point1: "Deciding under pressure",
            point2: "Comparing yourself to others",
            point3: "Fixating on one factor, like salary or prestige",
            point4: "Staying the course only because of sunk costs",
            sceneIndex: "02 / KEY POINTS",
            theme: "summit",
            pointCues: "",
            sceneDuration: "10",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("root").setAttribute("data-theme", vars.theme || "summit");
          document.getElementById("kp-label").textContent = vars.label;
          document.getElementById("kp-heading").textContent = vars.heading;
          document.getElementById("kp-index").textContent = vars.sceneIndex;
          const points = [vars.point1, vars.point2, vars.point3, vars.point4];
          points.forEach(function (p, i) {
            const item = document.getElementById("kp-item-" + (i + 1));
            if (p && String(p).trim() !== "") {
              document.getElementById("kp-text-" + (i + 1)).textContent = p;
            } else {
              item.remove();
            }
          });

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#kp-tick", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power3.out" }, 0.1);
          tl.fromTo("#kp-label", { opacity: 0, x: -32 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.2);
          tl.fromTo("#kp-heading", { opacity: 0, y: 46 }, { opacity: 1, y: 0, duration: 0.7, ease: "power4.out" }, 0.35);
          tl.fromTo("#kp-rail", { scaleY: 0 }, { scaleY: 1, duration: 0.8, ease: "power2.inOut" }, 0.3);
          tl.fromTo("#kp-rail-label", { opacity: 0 }, { opacity: 1, duration: 0.6 }, 0.8);
          const items = gsap.utils.toArray(".kp-item");
          // Explicit reveal cues (local seconds) sync each bullet to the moment
          // the narration says it. Empty/absent → default even spread.
          const cues = String(vars.pointCues || "")
            .split(",")
            .map(function (s) { return Number(s.trim()); })
            .filter(function (v) { return !isNaN(v); });
          items.forEach(function (item, i) {
            const at = cues.length ? Math.max(0.4, cues[i]) : 0.85 + i * 0.55;
            tl.fromTo(
              item,
              { opacity: 0, x: 70 },
              { opacity: 1, x: 0, duration: 0.55, ease: "power3.out" },
              at,
            );
            const num = item.querySelector(".kp-num");
            tl.fromTo(num, { scale: 0.4 }, { scale: 1, duration: 0.5, ease: "back.out(1.6)" }, at + 0.05);
          });
          // Furniture paints at t=0 (frame.md — no bare first frame at a cut).
          tl.fromTo("#kp-index", { opacity: 0.55 }, { opacity: 1, duration: 0.5 }, 0);
          tl.fromTo("#kp-ghost-ring", { opacity: 0.5, scale: 0.97 }, { opacity: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 0);
          tl.fromTo("#kp-ghost-ring-2", { opacity: 0.5, scale: 0.96 }, { opacity: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 0.2);
          tl.fromTo("#kp-ghost-ring", { rotation: 0 }, { rotation: 4, duration: 5.4, ease: "sine.inOut", repeat: 0 }, 1.4);
          tl.fromTo("#kp-ghost-ring-2", { scale: 1 }, { scale: 1.05, duration: 2.9, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.6);
          // Ambient drift cycles (2026-07-15 animacy regression fix): the ghost rings
          // drift in finite translate-only sine yoyo cycles across the whole scene so
          // the decorative layer registers at QA frame sampling even between cues.
          const sceneDur = Math.max(4, Number(vars.sceneDuration) || 10);
          const drift = function (sel, ax, ay, per) {
            tl.fromTo(sel, { x: 0, y: 0 }, { x: ax, y: ay, duration: per, ease: "sine.inOut",
              yoyo: true, repeat: Math.max(1, Math.ceil(sceneDur / per) - 1) }, 0);
          };
          drift("#kp-ghost-ring", 24, 14, 3.3);
          drift("#kp-ghost-ring-2", -20, -12, 2.8);
          // (No late-phase re-marks, pre-cue keep-alives, or inter-cue nudges on
          // settled rows/headings — owner decision 2026-07-14, REAFFIRMED 2026-07-15
          // after an unauthorized restoration shipped in rendered cuts. Dead gaps
          // between cues are an AUTHORING defect: cover them with staged beats —
          // `subBeats`, tighter cues, or a scene split — never by moving settled text.)
          // Sub-beats: a cued live line that swaps text on each spoken cue —
          // covers narration spans between primary reveals (dead-hold fix,
          // owner-approved 2026-07-14). Empty subBeats (the default) = no DOM,
          // no timeline impact. Seek-safe: tween-only swaps, no .call().
          const subBeats = String(vars.subBeats || "").split("|").map(function (s) { return s.trim(); }).filter(Boolean);
          const subCues = String(vars.subCues || "").split(",").map(function (s) { return Number(s.trim()); }).filter(function (v) { return !isNaN(v); });
          if (subBeats.length && subCues.length === subBeats.length) {
            subBeats.forEach(function (text, i) {
              const el = document.createElement("div");
              el.className = "kp-subbeat";
              el.setAttribute("data-layout-allow-occlusion", "");
              el.textContent = text;
              document.getElementById("root").appendChild(el);
              const at = Math.max(0.4, subCues[i]);
              tl.fromTo(el, { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, at);
              if (i + 1 < subBeats.length) {
                const out = Math.max(at + 0.5, Math.max(0.4, subCues[i + 1]) - 0.35);
                tl.to(el, { opacity: 0, y: -18, duration: 0.3, ease: "power2.in" }, out);
              }
            });
          }
          window.__timelines["scla-points"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
