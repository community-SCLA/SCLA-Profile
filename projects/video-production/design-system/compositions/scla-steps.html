<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"label","type":"string","label":"Section label","default":"The shift"},
    {"id":"heading","type":"string","label":"Heading","default":"From pressure to process"},
    {"id":"step1","type":"string","label":"Step 1","default":"Define success for the next 3–5 years"},
    {"id":"step2","type":"string","label":"Step 2","default":"Broaden your options"},
    {"id":"step3","type":"string","label":"Step 3","default":"Compare with your criteria"},
    {"id":"step4","type":"string","label":"Step 4 (empty to hide)","default":"Notice what you still don&apos;t know"},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"03 / PROCESS"},
    {"id":"theme","type":"string","label":"Style package (summit | horizon | cadence)","default":"summit"},
    {"id":"subBeats","type":"string","label":"Sub-beats — narration-synced live line, pipe-separated (empty = off)","default":""},
    {"id":"subCues","type":"string","label":"Per-sub-beat reveal times, local sec, comma-separated (compiler-owned)","default":""},
    {"id":"sceneDuration","type":"string","label":"Scene duration in seconds (compiler-maintained; times the late-phase resolve)","default":"10"},
    {"id":"stepCues","type":"string","label":"Per-step activation times, local sec, comma-separated (empty = default spread)","default":""},
    {"id":"icon","type":"string","label":"Optional living icon name (see frame.md icon library; empty = none). Replaces the ghost numeral when set.","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", system-ui, sans-serif;
        }
        .st-bg {
          position: absolute;
          inset: 0;
          background: #ffffff;
        }
        .st-bg::after {
          content: "";
          position: absolute;
          inset: 0;
          background-image: radial-gradient(rgba(51, 147, 214, 0.14) 2px, transparent 2px);
          background-size: 64px 64px;
        }
        #st-panel {
          position: absolute;
          left: 0;
          top: 0;
          right: 0;
          height: 320px;
          background: #f0f2f9;
          border-bottom: 2px solid #cccedf;
        }
        #st-ghost-num {
          position: absolute;
          right: 60px;
          top: -60px;
          font-size: 380px;
          font-weight: 900;
          color: rgba(51, 147, 214, 0.12);
          line-height: 1;
        }
        #st-head {
          position: absolute;
          left: 120px;
          top: 84px;
        }
        #st-label-row {
          display: flex;
          align-items: center;
          gap: 18px;
        }
        #st-tick {
          width: 46px;
          height: 4px;
          background: #eaab2d;
          transform-origin: left center;
        }
        #st-label {
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          color: #3393d6;
        }
        #st-heading {
          margin-top: 16px;
          font-size: 66px;
          font-weight: 900;
          color: #0d2437;
          line-height: 1.08;
        }
        #st-track {
          position: absolute;
          left: 160px;
          right: 160px;
          top: 600px;
          height: 4px;
          background: #cccedf;
        }
        #st-track-fill {
          position: absolute;
          left: 160px;
          right: 160px;
          top: 600px;
          height: 4px;
          background: #3393d6;
          transform-origin: left center;
        }
        .st-node {
          position: absolute;
          top: 542px;
          width: 120px;
          height: 120px;
          border-radius: 50%;
          background: #ffffff;
          border: 4px solid #0d2437;
          display: grid;
          place-items: center;
          font-size: 44px;
          font-weight: 900;
          color: #0d2437;
        }
        .st-node .st-node-fill {
          position: absolute;
          inset: -4px;
          border-radius: 50%;
          background: #eaab2d;
        }
        .st-node span {
          position: relative;
        }
        .st-caption {
          position: absolute;
          top: 700px;
          width: 320px;
          text-align: center;
          font-size: 28px;
          font-weight: 700;
          color: #292f35;
          line-height: 1.3;
        }
        #st-node-1 { left: 220px; }
        #st-node-2 { left: 660px; }
        #st-node-3 { left: 1100px; }
        #st-node-4 { left: 1540px; }
        #st-cap-1 { left: 120px; }
        #st-cap-2 { left: 560px; }
        #st-cap-3 { left: 1000px; }
        #st-cap-4 { left: 1440px; }
        #st-index {
          position: absolute;
          right: 120px;
          bottom: 58px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        #st-brandline {
          position: absolute;
          left: 120px;
          bottom: 58px;
          font-size: 19px;
          font-weight: 700;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        /* Sub-beats — narration-synced live line (dead-hold fix, 2026-07-14).
           One beat visible at a time; absent unless subBeats is set. */
        .st-subbeat {
          position: absolute;
          left: 160px;
          right: 160px;
          bottom: 132px;
          text-align: center;
          font-size: 30px;
          font-weight: 700;
          color: #0d2437;
          opacity: 0;
        }
        /* Optional living icon (opt-in via `icon`; frame.md → "Living icon library").
           Sits in the header panel's top-right and REPLACES the ghost numeral when set;
           absent by default so step scenes without an icon are unchanged. */
        #st-iconwrap { position: absolute; right: 130px; top: 86px; width: 150px; height: 150px; display: none; }
        #st-iconwrap svg { width: 150px; height: 150px; }
        #root[data-has-icon="1"] #st-ghost-num { display: none; }
        /* Style packages (frame.md "Style packages") — visual layer only; timeline identical */
        #root[data-theme="horizon"] #st-panel { background: #f6f6f9; }
        #root[data-theme="horizon"] .st-bg::after { background-image: radial-gradient(rgba(51, 147, 214, 0.1) 2px, transparent 2px); }
        #root[data-theme="horizon"] #st-tick { background: #3393d6; }
        #root[data-theme="horizon"] #st-ghost-num { color: rgba(234, 171, 45, 0.14); }
        #root[data-theme="horizon"] .st-node .st-node-fill { background: #3393d6; }
        #root[data-theme="horizon"] .st-node span { color: #ffffff; }
        #root[data-theme="cadence"] #st-panel { background: radial-gradient(140% 160% at 24% 30%, #0d2437 0%, #0a1e2f 80%); border-bottom: 4px solid #eaab2d; }
        #root[data-theme="cadence"] #st-label { color: #eaab2d; }
        #root[data-theme="cadence"] #st-tick { background: #3393d6; }
        #root[data-theme="cadence"] #st-heading { color: #ffffff; }
        #root[data-theme="cadence"] #st-ghost-num { color: rgba(234, 171, 45, 0.18); }
        #root[data-theme="cadence"] #st-track-fill { background: #eaab2d; }
      </style>

      <div id="root" data-composition-id="scla-steps" data-width="1920" data-height="1080" data-duration="8">
        <div class="st-bg"></div>
        <div id="st-panel"></div>
        <div id="st-ghost-num" data-layout-allow-overflow data-layout-allow-occlusion>4</div>
        <div id="st-iconwrap" data-layout-allow-overflow><svg viewBox="0 0 96 96" fill="none"></svg></div>
        <div id="st-head">
          <div id="st-label-row">
            <div id="st-tick"></div>
            <div id="st-label" data-layout-allow-occlusion>The shift</div>
          </div>
          <h2 id="st-heading" data-layout-allow-occlusion>From pressure to process</h2>
        </div>
        <div id="st-track"></div>
        <div id="st-track-fill"></div>
        <div class="st-node" id="st-node-1"><div class="st-node-fill"></div><span>1</span></div>
        <div class="st-node" id="st-node-2"><div class="st-node-fill"></div><span>2</span></div>
        <div class="st-node" id="st-node-3"><div class="st-node-fill"></div><span>3</span></div>
        <div class="st-node" id="st-node-4"><div class="st-node-fill"></div><span>4</span></div>
        <div class="st-caption" id="st-cap-1">Define success for the next 3–5 years</div>
        <div class="st-caption" id="st-cap-2">Broaden your options</div>
        <div class="st-caption" id="st-cap-3">Compare with your criteria</div>
        <div class="st-caption" id="st-cap-4">Notice what you still don't know</div>
        <div id="st-index" data-layout-allow-occlusion>03 / PROCESS</div>
        <div id="st-brandline">SCLA · Lesson System</div>
      </div>

      <script>
        (function () {
          const defaults = {
            label: "The shift",
            heading: "From pressure to process",
            step1: "Define success for the next 3–5 years",
            step2: "Broaden your options",
            step3: "Compare with your criteria",
            step4: "Notice what you still don't know",
            sceneIndex: "03 / PROCESS",
            theme: "summit",
            sceneDuration: "10",
            stepCues: "",
            icon: "",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("root").setAttribute("data-theme", vars.theme || "summit");
          document.getElementById("st-label").textContent = vars.label;
          document.getElementById("st-heading").textContent = vars.heading;
          document.getElementById("st-index").textContent = vars.sceneIndex;
          const steps = [vars.step1, vars.step2, vars.step3, vars.step4];
          let visible = 0;
          steps.forEach(function (s, i) {
            const node = document.getElementById("st-node-" + (i + 1));
            const cap = document.getElementById("st-cap-" + (i + 1));
            if (s && String(s).trim() !== "") {
              cap.textContent = s;
              visible += 1;
            } else {
              node.remove();
              cap.remove();
            }
          });
          document.getElementById("st-ghost-num").textContent = String(visible);

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#st-panel", { yPercent: -100 }, { yPercent: 0, duration: 0.7, ease: "power3.out" }, 0);
          tl.fromTo("#st-tick", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power3.out" }, 0.3);
          tl.fromTo("#st-label", { opacity: 0, x: -32 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.4);
          tl.fromTo("#st-heading", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power4.out" }, 0.5);
          tl.fromTo("#st-ghost-num", { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.9, ease: "power2.out" }, 0.6);
          tl.fromTo("#st-track", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0.9);
          tl.fromTo("#st-track-fill", { scaleX: 0 }, { scaleX: 1, duration: 2.4, ease: "power2.inOut" }, 1.1);
          // Explicit activation cues (local seconds) fire each step node/caption the
          // moment the narration reaches that step ("first… second… third…"). Empty →
          // default even spread. frame.md → "Reveal on the spoken cue, not on a timer".
          const stepCues = String(vars.stepCues || "")
            .split(",")
            .map(function (s) { return Number(s.trim()); })
            .filter(function (v) { return !isNaN(v); });
          for (let i = 0; i < visible; i++) {
            const at = stepCues.length ? Math.max(0.4, stepCues[i]) : 1.15 + i * 0.62;
            tl.fromTo(
              "#st-node-" + (i + 1),
              { opacity: 0, scale: 0.4 },
              { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.6)" },
              at,
            );
            tl.fromTo(
              "#st-node-" + (i + 1) + " .st-node-fill",
              { scale: 0, opacity: 0 },
              { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
              at + 0.18,
            );
            tl.fromTo(
              "#st-cap-" + (i + 1),
              { opacity: 0, y: 28 },
              { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
              at + 0.22,
            );
          }
          // Furniture paints at t=0 (frame.md — no bare first frame at a cut).
          tl.fromTo(["#st-index", "#st-brandline"], { opacity: 0.55 }, { opacity: 1, duration: 0.5 }, 0);
          // Ambient drift cycles (2026-07-15 animacy regression fix): the ghost numeral
          // drifts horizontally in finite translate-only sine yoyo cycles across the
          // whole scene (x-only — its entrance owns y) so the decorative layer registers
          // at QA frame sampling even between cues.
          const sceneDur = Math.max(4, Number(vars.sceneDuration) || 10);
          tl.fromTo("#st-ghost-num", { x: 0 }, { x: 20, duration: 3.2, ease: "sine.inOut",
            yoyo: true, repeat: Math.max(1, Math.ceil(sceneDur / 3.2) - 1) }, 0);
          // (No pre-cue keep-alives or late-phase node re-marks — owner decision
          // 2026-07-14, REAFFIRMED 2026-07-15 after an unauthorized restoration.
          // Long holds are covered by staged beats: `subBeats`, cues, or a split.)
          // Sub-beats: a cued live line that swaps text on each spoken cue —
          // covers narration spans between primary reveals (dead-hold fix,
          // owner-approved 2026-07-14). Empty subBeats (the default) = no DOM,
          // no timeline impact. Seek-safe: tween-only swaps, no .call().
          const subBeats = String(vars.subBeats || "").split("|").map(function (s) { return s.trim(); }).filter(Boolean);
          const subCues = String(vars.subCues || "").split(",").map(function (s) { return Number(s.trim()); }).filter(function (v) { return !isNaN(v); });
          if (subBeats.length && subCues.length === subBeats.length) {
            subBeats.forEach(function (text, i) {
              const el = document.createElement("div");
              el.className = "st-subbeat";
              el.setAttribute("data-layout-allow-occlusion", "");
              el.textContent = text;
              document.getElementById("root").appendChild(el);
              const at = Math.max(0.4, subCues[i]);
              tl.fromTo(el, { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, at);
              if (i + 1 < subBeats.length) {
                const out = Math.max(at + 0.5, Math.max(0.4, subCues[i + 1]) - 0.35);
                tl.to(el, { opacity: 0, y: -18, duration: 0.3, ease: "power2.in" }, out);
              }
            });
          }
          // Optional living icon in the header panel (opt-in via `icon`; owner decision
          // 2026-07-15 — living icons may appear on single-focus step scenes, still
          // sparing and drawn on the cue). Geometry MIRRORED from scla-condition.html's
          // ICONS map (the canonical source; frame.md → "Living icon library" — keep in
          // sync). Main stroke follows the panel: navy on the light panel, white on the
          // navy cadence panel; gold accents/dots pop last.
          const iconName = String(vars.icon || "").trim();
          if (iconName) {
            const RING = "M 48 16 A 32 32 0 1 1 48 80 A 32 32 0 1 1 48 16 Z";
            const ICONS = {
              compass: { paths: [{ d: RING }, { d: "M37 59 L54 42", gd: true }, { d: "M59 37 L52 44 L55 47 Z", gd: true }], circles: [{ cx: 48, cy: 48, r: 3.5, fill: true }] },
              pressure: { paths: [{ d: RING }, { d: "M48 48 L48 28" }, { d: "M48 48 L63 55", gd: true }], circles: [{ cx: 48, cy: 48, r: 3.5, fill: true }] },
              insight: { paths: [{ d: "M 48 22 A 18 18 0 1 1 48 58 A 18 18 0 1 1 48 22 Z" }, { d: "M40 55 L56 55" }, { d: "M43 61 L53 61" }, { d: "M42 43 L48 36 L54 43", gd: true }], circles: [] },
              salary: { paths: [{ d: "M26 46 L46 26 L70 26 L70 50 L50 70 Z" }], circles: [{ cx: 58, cy: 38, r: 5, gd: true }] },
              mentorship: { paths: [{ d: "M20 70 Q36 52 52 70" }, { d: "M50 72 Q64 56 78 72", gd: true }], circles: [{ cx: 36, cy: 34, r: 10 }, { cx: 64, cy: 40, r: 9, gd: true }] },
              mentorship2: { paths: [{ d: "M20 70 Q36 52 52 70", gd: true }, { d: "M50 72 Q64 56 78 72" }], circles: [{ cx: 36, cy: 34, r: 9, gd: true }, { cx: 64, cy: 40, r: 10 }] },
              growth: { paths: [{ d: "M22 74 L22 22" }, { d: "M22 74 L76 74" }, { d: "M28 62 L42 50 L54 56 L72 32" }, { d: "M62 32 L72 32 L72 42", gd: true }], circles: [] },
              target: { paths: [{ d: RING }, { d: "M 48 28 A 20 20 0 1 1 48 68 A 20 20 0 1 1 48 28 Z" }], circles: [{ cx: 48, cy: 48, r: 8, gd: true, fill: true }] },
              question: { paths: [{ d: RING }, { d: "M39 40 Q39 30 48 30 Q58 30 58 40 Q58 48 48 51 L48 56", gd: true }], circles: [{ cx: 48, cy: 65, r: 3.2, gd: true, fill: true }] },
              examine: { paths: [{ d: "M 48 12 A 22 22 0 1 1 48 56 A 22 22 0 1 1 48 12 Z" }, { d: "M58 58 L76 76", gd: true }], circles: [] },
              done: { paths: [{ d: RING }, { d: "M34 49 L44 60 L64 37", gd: true }], circles: [] },
            };
            const ic = ICONS[iconName];
            if (ic) {
              const svg = document.querySelector("#st-iconwrap svg");
              const strokeMain = String(vars.theme) === "cadence" ? "#ffffff" : "#0d2437";
              const draws = [], dots = [];
              (ic.paths || []).forEach(function (p) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", "path");
                el.setAttribute("d", p.d); el.setAttribute("fill", "none");
                el.setAttribute("stroke", p.gd ? "#eaab2d" : strokeMain);
                el.setAttribute("stroke-width", "4"); el.setAttribute("stroke-linecap", "round"); el.setAttribute("stroke-linejoin", "round");
                el.setAttribute("pathLength", "100"); svg.appendChild(el); draws.push(el);
              });
              (ic.circles || []).forEach(function (c) {
                const el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                el.setAttribute("cx", c.cx); el.setAttribute("cy", c.cy); el.setAttribute("r", c.r);
                if (c.fill) { el.setAttribute("fill", c.gd ? "#eaab2d" : strokeMain); el.setAttribute("stroke", "none"); dots.push(el); }
                else { el.setAttribute("fill", "none"); el.setAttribute("stroke", c.gd ? "#eaab2d" : strokeMain); el.setAttribute("stroke-width", "4"); el.setAttribute("pathLength", "100"); draws.push(el); }
                svg.appendChild(el);
              });
              document.getElementById("root").setAttribute("data-has-icon", "1");
              document.getElementById("st-iconwrap").style.display = "block";
              // Draw on after the header panel lands (~0.7s), gold accents/dots pop last.
              if (draws.length) tl.fromTo(draws, { strokeDasharray: "100 100", strokeDashoffset: 100 }, { strokeDashoffset: 0, duration: 0.55, ease: "power3.out", stagger: 0.13 }, 0.75);
              if (dots.length) tl.fromTo(dots, { scale: 0, transformOrigin: "center" }, { scale: 1, duration: 0.4, ease: "back.out(2)" }, 1.45);
              // Ambient bob on the HTML wrapper (translate-only, never scale + SVG-opacity).
              tl.fromTo("#st-iconwrap", { x: 0, y: 0 }, { x: 0, y: -8, duration: 2.7, ease: "sine.inOut", yoyo: true, repeat: Math.max(1, Math.ceil(sceneDur / 2.7) - 1) }, 0);
            }
          }
          window.__timelines["scla-steps"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
