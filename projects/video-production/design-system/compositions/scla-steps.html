<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"label","type":"string","label":"Section label","default":"The shift"},
    {"id":"heading","type":"string","label":"Heading","default":"From pressure to process"},
    {"id":"step1","type":"string","label":"Step 1","default":"Define success for the next 3–5 years"},
    {"id":"step2","type":"string","label":"Step 2","default":"Broaden your options"},
    {"id":"step3","type":"string","label":"Step 3","default":"Compare with your criteria"},
    {"id":"step4","type":"string","label":"Step 4 (empty to hide)","default":"Notice what you still don&apos;t know"},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"03 / PROCESS"},
    {"id":"theme","type":"string","label":"Style package (summit | horizon | cadence)","default":"summit"},
    {"id":"subBeats","type":"string","label":"Sub-beats — narration-synced live line, pipe-separated (empty = off)","default":""},
    {"id":"subCues","type":"string","label":"Per-sub-beat reveal times, local sec, comma-separated (compiler-owned)","default":""},
    {"id":"sceneDuration","type":"string","label":"Scene duration in seconds (compiler-maintained; times the late-phase resolve)","default":"10"},
    {"id":"stepCues","type":"string","label":"Per-step activation times, local sec, comma-separated (empty = default spread)","default":""}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", system-ui, sans-serif;
        }
        .st-bg {
          position: absolute;
          inset: 0;
          background: #ffffff;
        }
        .st-bg::after {
          content: "";
          position: absolute;
          inset: 0;
          background-image: radial-gradient(rgba(51, 147, 214, 0.14) 2px, transparent 2px);
          background-size: 64px 64px;
        }
        #st-panel {
          position: absolute;
          left: 0;
          top: 0;
          right: 0;
          height: 320px;
          background: #f0f2f9;
          border-bottom: 2px solid #cccedf;
        }
        #st-ghost-num {
          position: absolute;
          right: 60px;
          top: -60px;
          font-size: 380px;
          font-weight: 900;
          color: rgba(51, 147, 214, 0.12);
          line-height: 1;
        }
        #st-head {
          position: absolute;
          left: 120px;
          top: 84px;
        }
        #st-label-row {
          display: flex;
          align-items: center;
          gap: 18px;
        }
        #st-tick {
          width: 46px;
          height: 4px;
          background: #eaab2d;
          transform-origin: left center;
        }
        #st-label {
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          color: #3393d6;
        }
        #st-heading {
          margin-top: 16px;
          font-size: 66px;
          font-weight: 900;
          color: #0d2437;
          line-height: 1.08;
        }
        #st-track {
          position: absolute;
          left: 160px;
          right: 160px;
          top: 600px;
          height: 4px;
          background: #cccedf;
        }
        #st-track-fill {
          position: absolute;
          left: 160px;
          right: 160px;
          top: 600px;
          height: 4px;
          background: #3393d6;
          transform-origin: left center;
        }
        .st-node {
          position: absolute;
          top: 542px;
          width: 120px;
          height: 120px;
          border-radius: 50%;
          background: #ffffff;
          border: 4px solid #0d2437;
          display: grid;
          place-items: center;
          font-size: 44px;
          font-weight: 900;
          color: #0d2437;
        }
        .st-node .st-node-fill {
          position: absolute;
          inset: -4px;
          border-radius: 50%;
          background: #eaab2d;
        }
        .st-node span {
          position: relative;
        }
        .st-caption {
          position: absolute;
          top: 700px;
          width: 320px;
          text-align: center;
          font-size: 28px;
          font-weight: 700;
          color: #292f35;
          line-height: 1.3;
        }
        #st-node-1 { left: 220px; }
        #st-node-2 { left: 660px; }
        #st-node-3 { left: 1100px; }
        #st-node-4 { left: 1540px; }
        #st-cap-1 { left: 120px; }
        #st-cap-2 { left: 560px; }
        #st-cap-3 { left: 1000px; }
        #st-cap-4 { left: 1440px; }
        #st-index {
          position: absolute;
          right: 120px;
          bottom: 58px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        #st-brandline {
          position: absolute;
          left: 120px;
          bottom: 58px;
          font-size: 19px;
          font-weight: 700;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        /* Sub-beats — narration-synced live line (dead-hold fix, 2026-07-14).
           One beat visible at a time; absent unless subBeats is set. */
        .st-subbeat {
          position: absolute;
          left: 160px;
          right: 160px;
          bottom: 132px;
          text-align: center;
          font-size: 30px;
          font-weight: 700;
          color: #0d2437;
          opacity: 0;
        }
        /* Style packages (frame.md "Style packages") — visual layer only; timeline identical */
        #root[data-theme="horizon"] #st-panel { background: #f6f6f9; }
        #root[data-theme="horizon"] .st-bg::after { background-image: radial-gradient(rgba(51, 147, 214, 0.1) 2px, transparent 2px); }
        #root[data-theme="horizon"] #st-tick { background: #3393d6; }
        #root[data-theme="horizon"] #st-ghost-num { color: rgba(234, 171, 45, 0.14); }
        #root[data-theme="horizon"] .st-node .st-node-fill { background: #3393d6; }
        #root[data-theme="horizon"] .st-node span { color: #ffffff; }
        #root[data-theme="cadence"] #st-panel { background: radial-gradient(140% 160% at 24% 30%, #0d2437 0%, #0a1e2f 80%); border-bottom: 4px solid #eaab2d; }
        #root[data-theme="cadence"] #st-label { color: #eaab2d; }
        #root[data-theme="cadence"] #st-tick { background: #3393d6; }
        #root[data-theme="cadence"] #st-heading { color: #ffffff; }
        #root[data-theme="cadence"] #st-ghost-num { color: rgba(234, 171, 45, 0.18); }
        #root[data-theme="cadence"] #st-track-fill { background: #eaab2d; }
      </style>

      <div id="root" data-composition-id="scla-steps" data-width="1920" data-height="1080" data-duration="8">
        <div class="st-bg"></div>
        <div id="st-panel"></div>
        <div id="st-ghost-num" data-layout-allow-overflow data-layout-allow-occlusion>4</div>
        <div id="st-head">
          <div id="st-label-row">
            <div id="st-tick"></div>
            <div id="st-label" data-layout-allow-occlusion>The shift</div>
          </div>
          <h2 id="st-heading" data-layout-allow-occlusion>From pressure to process</h2>
        </div>
        <div id="st-track"></div>
        <div id="st-track-fill"></div>
        <div class="st-node" id="st-node-1"><div class="st-node-fill"></div><span>1</span></div>
        <div class="st-node" id="st-node-2"><div class="st-node-fill"></div><span>2</span></div>
        <div class="st-node" id="st-node-3"><div class="st-node-fill"></div><span>3</span></div>
        <div class="st-node" id="st-node-4"><div class="st-node-fill"></div><span>4</span></div>
        <div class="st-caption" id="st-cap-1">Define success for the next 3–5 years</div>
        <div class="st-caption" id="st-cap-2">Broaden your options</div>
        <div class="st-caption" id="st-cap-3">Compare with your criteria</div>
        <div class="st-caption" id="st-cap-4">Notice what you still don't know</div>
        <div id="st-index" data-layout-allow-occlusion>03 / PROCESS</div>
        <div id="st-brandline">SCLA · Lesson System</div>
      </div>

      <script>
        (function () {
          const defaults = {
            label: "The shift",
            heading: "From pressure to process",
            step1: "Define success for the next 3–5 years",
            step2: "Broaden your options",
            step3: "Compare with your criteria",
            step4: "Notice what you still don't know",
            sceneIndex: "03 / PROCESS",
            theme: "summit",
            sceneDuration: "10",
            stepCues: "",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("root").setAttribute("data-theme", vars.theme || "summit");
          document.getElementById("st-label").textContent = vars.label;
          document.getElementById("st-heading").textContent = vars.heading;
          document.getElementById("st-index").textContent = vars.sceneIndex;
          const steps = [vars.step1, vars.step2, vars.step3, vars.step4];
          let visible = 0;
          steps.forEach(function (s, i) {
            const node = document.getElementById("st-node-" + (i + 1));
            const cap = document.getElementById("st-cap-" + (i + 1));
            if (s && String(s).trim() !== "") {
              cap.textContent = s;
              visible += 1;
            } else {
              node.remove();
              cap.remove();
            }
          });
          document.getElementById("st-ghost-num").textContent = String(visible);

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#st-panel", { yPercent: -100 }, { yPercent: 0, duration: 0.7, ease: "power3.out" }, 0);
          tl.fromTo("#st-tick", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power3.out" }, 0.3);
          tl.fromTo("#st-label", { opacity: 0, x: -32 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.4);
          tl.fromTo("#st-heading", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power4.out" }, 0.5);
          tl.fromTo("#st-ghost-num", { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.9, ease: "power2.out" }, 0.6);
          tl.fromTo("#st-track", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 0.9);
          tl.fromTo("#st-track-fill", { scaleX: 0 }, { scaleX: 1, duration: 2.4, ease: "power2.inOut" }, 1.1);
          // Explicit activation cues (local seconds) fire each step node/caption the
          // moment the narration reaches that step ("first… second… third…"). Empty →
          // default even spread. frame.md → "Reveal on the spoken cue, not on a timer".
          const stepCues = String(vars.stepCues || "")
            .split(",")
            .map(function (s) { return Number(s.trim()); })
            .filter(function (v) { return !isNaN(v); });
          for (let i = 0; i < visible; i++) {
            const at = stepCues.length ? Math.max(0.4, stepCues[i]) : 1.15 + i * 0.62;
            tl.fromTo(
              "#st-node-" + (i + 1),
              { opacity: 0, scale: 0.4 },
              { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.6)" },
              at,
            );
            tl.fromTo(
              "#st-node-" + (i + 1) + " .st-node-fill",
              { scale: 0, opacity: 0 },
              { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
              at + 0.18,
            );
            tl.fromTo(
              "#st-cap-" + (i + 1),
              { opacity: 0, y: 28 },
              { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
              at + 0.22,
            );
          }
          // Furniture paints at t=0 (frame.md — no bare first frame at a cut).
          tl.fromTo(["#st-index", "#st-brandline"], { opacity: 0.55 }, { opacity: 1, duration: 0.5 }, 0);
          // (Removed late-phase step-node re-marks — owner decision 2026-07-14.
          // Settled nodes stay put; scene entrances cover No-Dead-Frames.)
          // Sub-beats: a cued live line that swaps text on each spoken cue —
          // covers narration spans between primary reveals (dead-hold fix,
          // owner-approved 2026-07-14). Empty subBeats (the default) = no DOM,
          // no timeline impact. Seek-safe: tween-only swaps, no .call().
          const subBeats = String(vars.subBeats || "").split("|").map(function (s) { return s.trim(); }).filter(Boolean);
          const subCues = String(vars.subCues || "").split(",").map(function (s) { return Number(s.trim()); }).filter(function (v) { return !isNaN(v); });
          if (subBeats.length && subCues.length === subBeats.length) {
            subBeats.forEach(function (text, i) {
              const el = document.createElement("div");
              el.className = "st-subbeat";
              el.setAttribute("data-layout-allow-occlusion", "");
              el.textContent = text;
              document.getElementById("root").appendChild(el);
              const at = Math.max(0.4, subCues[i]);
              tl.fromTo(el, { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" }, at);
              if (i + 1 < subBeats.length) {
                const out = Math.max(at + 0.5, Math.max(0.4, subCues[i + 1]) - 0.35);
                tl.to(el, { opacity: 0, y: -18, duration: 0.3, ease: "power2.in" }, out);
              }
            });
          }
          window.__timelines["scla-steps"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
