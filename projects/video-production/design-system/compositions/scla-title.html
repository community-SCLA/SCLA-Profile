<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"eyebrow","type":"string","label":"Program name","default":"Early Career Boost"},
    {"id":"title","type":"string","label":"Lesson title","default":"Better Decisions Come From Better Criteria"},
    {"id":"meta","type":"string","label":"Meta line","default":"3 min"},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"01 / TITLE"},
    {"id":"theme","type":"string","label":"Style package (summit | horizon | cadence)","default":"summit"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <!-- head is source-file metadata only; the runtime clones <template> contents -->
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", system-ui, sans-serif;
        }
        .t-bg {
          position: absolute;
          inset: 0;
          background: radial-gradient(120% 140% at 32% 38%, #0d2437 0%, #0a1e2f 78%);
        }
        .t-ring {
          position: absolute;
          border-radius: 50%;
          border: 3px solid rgba(51, 147, 214, 0.35);
        }
        #t-ring-1 { width: 760px; height: 860px; right: -240px; top: -140px; }
        #t-ring-2 { width: 560px; height: 640px; right: -140px; top: -30px; border-color: rgba(234, 171, 45, 0.28); }
        #t-ring-3 { width: 380px; height: 440px; right: -50px; top: 76px; border-width: 2px; border-color: rgba(255, 255, 255, 0.16); }
        .t-corner {
          position: absolute;
          width: 34px;
          height: 34px;
          border: 3px solid rgba(255, 255, 255, 0.24);
        }
        #t-corner-tl { left: 60px; top: 60px; border-right: none; border-bottom: none; }
        #t-corner-br { right: 60px; bottom: 60px; border-left: none; border-top: none; }
        #t-logo {
          position: absolute;
          left: 120px;
          top: 92px;
          height: 76px;
        }
        #t-block {
          position: absolute;
          left: 120px;
          top: 330px;
          width: 1440px;
        }
        #t-rule {
          width: 148px;
          height: 4px;
          background: #eaab2d;
          transform-origin: left center;
        }
        #t-eyebrow {
          margin-top: 26px;
          font-size: 26px;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          color: #eaab2d;
        }
        #t-title {
          margin-top: 24px;
          font-size: 104px;
          line-height: 1.06;
          font-weight: 900;
          color: #ffffff;
          text-wrap: balance;
        }
        #t-meta-row {
          position: absolute;
          left: 120px;
          bottom: 120px;
          display: flex;
          align-items: center;
          gap: 28px;
        }
        #t-chip {
          padding: 10px 34px;
          border: 2px solid #3393d6;
          border-radius: 100px;
          color: #3393d6;
          font-size: 22px;
          font-weight: 700;
          letter-spacing: 0.14em;
          text-transform: uppercase;
        }
        #t-meta {
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #bcd3e4;
        }
        #t-index {
          position: absolute;
          right: 120px;
          bottom: 120px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: rgba(188, 211, 228, 0.7);
        }
        /* Style packages (frame.md "Style packages") — visual layer only; timeline identical */
        #root[data-theme="horizon"] .t-bg { background: radial-gradient(140% 120% at 50% 92%, #0d2437 0%, #0a1e2f 76%); }
        #root[data-theme="horizon"] #t-ring-1 { right: auto; top: auto; left: -260px; bottom: -220px; border-color: rgba(51, 147, 214, 0.38); }
        #root[data-theme="horizon"] #t-ring-2 { right: auto; top: auto; left: -150px; bottom: -120px; border-color: rgba(255, 255, 255, 0.16); }
        #root[data-theme="horizon"] #t-ring-3 { right: auto; top: auto; left: -40px; bottom: -20px; border-color: rgba(51, 147, 214, 0.2); }
        #root[data-theme="horizon"] #t-rule { background: #3393d6; }
        #root[data-theme="horizon"] #t-eyebrow { color: #bcd3e4; }
        #root[data-theme="horizon"] .t-corner { border-color: rgba(51, 147, 214, 0.4); }
        #root[data-theme="cadence"] .t-bg { background: radial-gradient(130% 130% at 78% 18%, #0d2437 0%, #0a1e2f 74%); }
        #root[data-theme="cadence"] .t-bg::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 14px; background: #eaab2d; }
        #root[data-theme="cadence"] #t-ring-1 { border-color: rgba(234, 171, 45, 0.32); }
        #root[data-theme="cadence"] #t-ring-2 { border-color: rgba(255, 255, 255, 0.16); }
        #root[data-theme="cadence"] #t-ring-3 { border-color: rgba(234, 171, 45, 0.22); }
        #root[data-theme="cadence"] #t-rule { width: 220px; }
        #root[data-theme="cadence"] .t-corner { border-color: rgba(234, 171, 45, 0.5); }
      </style>

      <div id="root" data-composition-id="scla-title" data-width="1920" data-height="1080" data-duration="8">
        <div class="t-bg"></div>
        <div class="t-ring" id="t-ring-1" data-layout-allow-overflow></div>
        <div class="t-ring" id="t-ring-2" data-layout-allow-overflow></div>
        <div class="t-ring" id="t-ring-3" data-layout-allow-overflow></div>
        <div class="t-corner" id="t-corner-tl"></div>
        <div class="t-corner" id="t-corner-br"></div>
        <img id="t-logo" src="assets/brand/SCLA-logo-icon.svg" alt="SCLA" />
        <div id="t-block">
          <div id="t-rule"></div>
          <div id="t-eyebrow">Early Career Boost</div>
          <h1 id="t-title">Better Decisions Come From Better Criteria</h1>
        </div>
        <div id="t-meta-row">
          <span id="t-chip">Lesson</span>
          <span id="t-meta">3 min</span>
        </div>
        <div id="t-index" data-layout-allow-occlusion>01 / TITLE</div>
      </div>

      <script>
        (function () {
          const defaults = {
            eyebrow: "Early Career Boost",
            title: "Better Decisions Come From Better Criteria",
            meta: "3 min",
            sceneIndex: "01 / TITLE",
            theme: "summit",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("root").setAttribute("data-theme", vars.theme || "summit");
          document.getElementById("t-eyebrow").textContent = vars.eyebrow;
          document.getElementById("t-title").textContent = vars.title;
          document.getElementById("t-meta").textContent = vars.meta;
          document.getElementById("t-index").textContent = vars.sceneIndex;

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#t-ring-1", { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0);
          tl.fromTo("#t-ring-2", { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0.15);
          tl.fromTo("#t-ring-3", { opacity: 0, scale: 0.88 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0.3);
          tl.fromTo("#t-logo", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.55, ease: "back.out(1.5)" }, 0.1);
          tl.fromTo(["#t-corner-tl", "#t-corner-br"], { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power1.out" }, 0.25);
          tl.fromTo("#t-rule", { scaleX: 0 }, { scaleX: 1, duration: 0.55, ease: "power3.out" }, 0.3);
          tl.fromTo("#t-eyebrow", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.45);
          tl.fromTo(
            "#t-title",
            { opacity: 0, y: 64, clipPath: "inset(0% 0% 100% 0%)" },
            { opacity: 1, y: 0, clipPath: "inset(0% 0% 0% 0%)", duration: 0.85, ease: "power4.out" },
            0.6,
          );
          tl.fromTo("#t-chip", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.15);
          tl.fromTo("#t-meta", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.28);
          tl.fromTo("#t-index", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "power1.out" }, 1.4);
          // Ambient breath for the rest of the 8s window (finite repeats, seek-safe)
          tl.fromTo("#t-ring-1", { scale: 1 }, { scale: 1.05, duration: 3.2, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.3);
          tl.fromTo("#t-ring-2", { scale: 1 }, { scale: 1.04, duration: 2.8, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.6);
          window.__timelines["scla-title"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
