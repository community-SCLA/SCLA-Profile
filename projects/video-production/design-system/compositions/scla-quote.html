<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"quote","type":"string","label":"Quote (words a NAMED person actually said)","default":"I picked my criteria before I compared a single option — that one change made the whole decision easier."},
    {"id":"speaker","type":"string","label":"Speaker name (a named person — required)","default":"Alex Rivera"},
    {"id":"speakerRole","type":"string","label":"Speaker role / affiliation","default":"Illustrative placeholder — replace with a real attributed quote"},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"05 / QUOTE"},
    {"id":"theme","type":"string","label":"Style package (summit | horizon | cadence)","default":"summit"},
    {"id":"sceneDuration","type":"string","label":"Scene duration in seconds (compiler-maintained; times the late-phase resolve)","default":"8"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <!--
      QUOTE CARD — use ONLY for words attributed to a NAMED person. A thesis line
      authored by SCLA or the program is NOT a quote: use scla-statement.html
      instead (no quote glyph, no attribution). See frame.md → "Scene index &
      numerals" → "Quotes are for humans; program lines are statements".
    -->
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", system-ui, sans-serif;
        }
        .q-bg {
          position: absolute;
          inset: 0;
          background: #f6f6f9;
          background-image: radial-gradient(rgba(51, 147, 214, 0.12) 2px, transparent 2px);
          background-size: 72px 72px;
        }
        #q-ring {
          position: absolute;
          right: -260px;
          bottom: -320px;
          width: 820px;
          height: 940px;
          border-radius: 50%;
          border: 3px solid rgba(234, 171, 45, 0.35);
        }
        #q-ring-2 {
          position: absolute;
          right: -180px;
          bottom: -240px;
          width: 620px;
          height: 720px;
          border-radius: 50%;
          border: 2px solid rgba(51, 147, 214, 0.28);
        }
        #q-card {
          position: absolute;
          left: 120px;
          top: 150px;
          width: 1360px;
          height: 780px;
          background: #0d2437;
          border-radius: 12px;
          box-shadow: 0 24px 80px rgba(13, 36, 55, 0.28);
        }
        #q-card-edge {
          position: absolute;
          left: 120px;
          top: 150px;
          width: 10px;
          height: 780px;
          background: #eaab2d;
          border-radius: 12px 0 0 12px;
          transform-origin: center top;
        }
        #q-glyph {
          position: absolute;
          left: 190px;
          top: 130px;
          font-size: 300px;
          font-weight: 900;
          color: #eaab2d;
          line-height: 1;
        }
        #q-text {
          position: absolute;
          left: 220px;
          top: 400px;
          width: 1160px;
          font-size: 58px;
          font-weight: 700;
          line-height: 1.28;
          color: #ffffff;
          text-wrap: balance;
        }
        #q-attr-row {
          position: absolute;
          left: 220px;
          top: 770px;
          display: flex;
          align-items: center;
          gap: 22px;
        }
        #q-attr-rule {
          width: 60px;
          height: 4px;
          background: #eaab2d;
          transform-origin: left center;
        }
        #q-attr {
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #eaab2d;
        }
        #q-role {
          position: absolute;
          left: 302px;
          top: 812px;
          font-size: 22px;
          font-weight: 400;
          color: #bcd3e4;
        }
        #q-index {
          position: absolute;
          right: 120px;
          bottom: 58px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        #q-brandline {
          position: absolute;
          left: 120px;
          bottom: 58px;
          font-size: 19px;
          font-weight: 700;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #5f6f96;
        }
        /* Style packages (frame.md "Style packages") — visual layer only; timeline identical */
        #root[data-theme="horizon"] .q-bg { background: #f6f6f9; background-image: none; }
        #root[data-theme="horizon"] #q-ring { right: auto; bottom: auto; left: -280px; top: -340px; border-color: rgba(51, 147, 214, 0.3); }
        #root[data-theme="horizon"] #q-ring-2 { right: auto; bottom: auto; left: -190px; top: -250px; border-color: rgba(234, 171, 45, 0.2); }
        #root[data-theme="horizon"] #q-card-edge { background: #3393d6; }
        #root[data-theme="horizon"] #q-glyph { color: #bcd3e4; }
        #root[data-theme="horizon"] #q-attr-rule { background: #3393d6; }
        #root[data-theme="horizon"] #q-attr { color: #3393d6; }
        #root[data-theme="cadence"] .q-bg { background: #ffffff; background-image: linear-gradient(rgba(51, 147, 214, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(51, 147, 214, 0.08) 1px, transparent 1px); background-size: 96px 96px; }
        #root[data-theme="cadence"] #q-card { box-shadow: 0 30px 90px rgba(13, 36, 55, 0.36); }
        #root[data-theme="cadence"] #q-card-edge { width: 16px; }
        #root[data-theme="cadence"] #q-ring { border-color: rgba(234, 171, 45, 0.4); }
        #root[data-theme="cadence"] #q-ring-2 { border-width: 3px; }
      </style>

      <div id="root" data-composition-id="scla-quote" data-width="1920" data-height="1080" data-duration="8">
        <div class="q-bg"></div>
        <div id="q-ring" data-layout-allow-overflow></div>
        <div id="q-ring-2" data-layout-allow-overflow></div>
        <div id="q-card"></div>
        <div id="q-card-edge"></div>
        <div id="q-glyph">&ldquo;</div>
        <div id="q-text">I picked my criteria before I compared a single option — that one change made the whole decision easier.</div>
        <div id="q-attr-row">
          <div id="q-attr-rule"></div>
          <div id="q-attr">Alex Rivera</div>
        </div>
        <div id="q-role">Illustrative placeholder — replace with a real attributed quote</div>
        <div id="q-index">05 / QUOTE</div>
        <div id="q-brandline">SCLA · Lesson System</div>
      </div>

      <script>
        (function () {
          const defaults = {
            quote: "I picked my criteria before I compared a single option — that one change made the whole decision easier.",
            speaker: "Alex Rivera",
            speakerRole: "Illustrative placeholder — replace with a real attributed quote",
            sceneIndex: "05 / QUOTE",
            theme: "summit",
            sceneDuration: "8",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("root").setAttribute("data-theme", vars.theme || "summit");
          document.getElementById("q-text").textContent = vars.quote;
          document.getElementById("q-attr").textContent = vars.speaker;
          document.getElementById("q-role").textContent = vars.speakerRole;
          document.getElementById("q-index").textContent = vars.sceneIndex;

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#q-card", { opacity: 0, y: 80, scale: 0.97 }, { opacity: 1, y: 0, scale: 1, duration: 0.75, ease: "power3.out" }, 0.1);
          tl.fromTo("#q-card-edge", { scaleY: 0 }, { scaleY: 1, duration: 0.7, ease: "power2.inOut" }, 0.5);
          tl.fromTo("#q-glyph", { opacity: 0, scale: 0.5, rotation: -12 }, { opacity: 1, scale: 1, rotation: 0, duration: 0.65, ease: "back.out(1.4)" }, 0.55);
          tl.fromTo(
            "#q-text",
            { opacity: 0, y: 54, clipPath: "inset(0% 0% 100% 0%)" },
            { opacity: 1, y: 0, clipPath: "inset(0% 0% 0% 0%)", duration: 0.9, ease: "power4.out" },
            0.8,
          );
          tl.fromTo("#q-attr-rule", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power3.out" }, 1.45);
          tl.fromTo("#q-attr", { opacity: 0, x: -26 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 1.55);
          tl.fromTo("#q-role", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 1.7);
          // Furniture paints at t=0 (frame.md — no bare first frame at a cut).
          tl.fromTo(["#q-index", "#q-brandline"], { opacity: 0.55 }, { opacity: 1, duration: 0.5 }, 0);
          tl.fromTo("#q-ring", { opacity: 0.5, scale: 0.97 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0.2);
          tl.fromTo("#q-ring-2", { opacity: 0.5, scale: 0.96 }, { opacity: 1, scale: 1, duration: 1.1, ease: "power2.out" }, 0.35);
          tl.fromTo("#q-ring", { scale: 1 }, { scale: 1.04, duration: 3.0, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.5);
          tl.fromTo("#q-ring-2", { scale: 1 }, { scale: 1.05, duration: 2.6, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.8);
          // Depth-drift parallax (promoted 2026-07-14; re-tuned 2026-07-15): the two ghost
          // rings drift at different rates behind the card — translate-only decorative
          // parallax in finite sine yoyo cycles sized to register at QA frame sampling.
          // (The promoted single whole-scene glide moved ~1px/s — pixel-identical between
          // 0.5s samples: render regression 2026-07-15.)
          const sdur = Math.max(4, Number(vars.sceneDuration) || 8);
          const drift = function (sel, ax, ay, per) {
            tl.fromTo(sel, { x: 0, y: 0 }, { x: ax, y: ay, duration: per, ease: "sine.inOut",
              yoyo: true, repeat: Math.max(1, Math.ceil(sdur / per) - 1) }, 0);
          };
          drift("#q-ring", 26, -16, 3.3);
          drift("#q-ring-2", -22, 12, 2.8);
          // (No late-phase card drift or any in-place motion of the settled card —
          // owner decision 2026-07-14, REAFFIRMED 2026-07-15 after an unauthorized
          // restoration. Long quote holds are covered by staged beats or a split.)
          window.__timelines["scla-quote"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
