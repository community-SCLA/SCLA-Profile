<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"value","type":"number","label":"Stat value (count-up target)","default":5},
    {"id":"prefix","type":"string","label":"Prefix (before the number)","default":""},
    {"id":"suffix","type":"string","label":"Suffix (after the number)","default":""},
    {"id":"statLabel","type":"string","label":"Stat label","default":"Paths to list — not just one"},
    {"id":"context","type":"string","label":"Context sentence","default":"If you only compare one job to one other job, your frame is too narrow. List three to five possible paths before you decide."},
    {"id":"sceneIndex","type":"string","label":"Scene index label","default":"05 / STAT"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
      <style>
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "proxima-nova", "Avenir Next", Avenir, "Segoe UI", system-ui, sans-serif;
        }
        .sh-bg {
          position: absolute;
          inset: 0;
          background: #ffffff;
          background-image:
            linear-gradient(rgba(51, 147, 214, 0.06) 1px, transparent 1px),
            linear-gradient(90deg, rgba(51, 147, 214, 0.06) 1px, transparent 1px);
          background-size: 120px 120px;
        }
        #sh-panel {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 820px;
          background: radial-gradient(130% 120% at 30% 40%, #0d2437 0%, #0a1e2f 82%);
        }
        #sh-panel-ring {
          position: absolute;
          left: -220px;
          top: -260px;
          width: 640px;
          height: 740px;
          border-radius: 50%;
          border: 3px solid rgba(51, 147, 214, 0.3);
        }
        #sh-panel-ring-2 {
          position: absolute;
          left: -160px;
          top: -190px;
          width: 460px;
          height: 540px;
          border-radius: 50%;
          border: 2px solid rgba(234, 171, 45, 0.3);
        }
        #sh-number {
          position: absolute;
          left: 110px;
          top: 330px;
          font-size: 300px;
          font-weight: 900;
          color: #eaab2d;
          line-height: 1;
          letter-spacing: -0.02em;
        }
        #sh-stat-label {
          position: absolute;
          left: 116px;
          top: 690px;
          width: 600px;
          font-size: 30px;
          font-weight: 700;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: #ffffff;
          line-height: 1.35;
        }
        #sh-stat-rule {
          position: absolute;
          left: 116px;
          top: 660px;
          width: 90px;
          height: 4px;
          background: #3393d6;
          transform-origin: left center;
        }
        #sh-context {
          position: absolute;
          left: 940px;
          top: 380px;
          width: 830px;
          font-size: 40px;
          font-weight: 400;
          line-height: 1.5;
          color: #292f35;
        }
        #sh-context-label {
          position: absolute;
          left: 940px;
          top: 310px;
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          color: #3393d6;
        }
        #sh-bar {
          position: absolute;
          left: 940px;
          top: 700px;
          width: 700px;
          height: 10px;
          background: #e5eff6;
          border-radius: 100px;
        }
        #sh-bar-fill {
          position: absolute;
          left: 940px;
          top: 700px;
          width: 700px;
          height: 10px;
          background: #eaab2d;
          border-radius: 100px;
          transform-origin: left center;
        }
        #sh-index {
          position: absolute;
          right: 120px;
          bottom: 58px;
          font-size: 20px;
          font-weight: 700;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #5f6f96;
        }
      </style>

      <div id="root" data-composition-id="scla-stat" data-width="1920" data-height="1080" data-duration="8">
        <div class="sh-bg"></div>
        <div id="sh-panel">
          <div id="sh-panel-ring" data-layout-allow-overflow></div>
          <div id="sh-panel-ring-2" data-layout-allow-overflow></div>
        </div>
        <div id="sh-number">5</div>
        <div id="sh-stat-rule"></div>
        <div id="sh-stat-label">Paths to list — not just one</div>
        <div id="sh-context-label">The move</div>
        <div id="sh-context">
          If you only compare one job to one other job, your frame is too narrow. List three to five
          possible paths before you decide.
        </div>
        <div id="sh-bar"></div>
        <div id="sh-bar-fill"></div>
        <div id="sh-index">05 / STAT</div>
      </div>

      <script>
        (function () {
          const defaults = {
            value: 5,
            prefix: "",
            suffix: "",
            statLabel: "Paths to list — not just one",
            context:
              "If you only compare one job to one other job, your frame is too narrow. List three to five possible paths before you decide.",
            sceneIndex: "05 / STAT",
          };
          const vars = Object.assign(
            {},
            defaults,
            window.__hyperframes && window.__hyperframes.getVariables ? window.__hyperframes.getVariables() : {},
          );
          document.getElementById("sh-stat-label").textContent = vars.statLabel;
          document.getElementById("sh-context").textContent = vars.context;
          document.getElementById("sh-index").textContent = vars.sceneIndex;

          const target = Number(vars.value) || 0;
          const numberEl = document.getElementById("sh-number");
          const fmt = function (n) {
            return String(vars.prefix || "") + Math.round(n).toLocaleString("en-US") + String(vars.suffix || "");
          };
          numberEl.textContent = fmt(0);

          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });
          tl.fromTo("#sh-panel", { xPercent: -100 }, { xPercent: 0, duration: 0.7, ease: "power3.out" }, 0);
          tl.fromTo(["#sh-panel-ring", "#sh-panel-ring-2"], { opacity: 0 }, { opacity: 1, duration: 0.8, stagger: 0.15 }, 0.5);
          tl.fromTo("#sh-number", { opacity: 0, y: 60 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.55);
          // Deterministic count-up: tween a proxy on the timeline; formatting happens in onUpdate.
          const proxy = { v: 0 };
          tl.fromTo(
            proxy,
            { v: 0 },
            {
              v: target,
              duration: 1.6,
              ease: "power2.out",
              onUpdate: function () {
                numberEl.textContent = fmt(proxy.v);
              },
            },
            0.7,
          );
          tl.fromTo("#sh-stat-rule", { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power3.out" }, 1.0);
          tl.fromTo("#sh-stat-label", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.1);
          tl.fromTo("#sh-context-label", { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.9);
          tl.fromTo("#sh-context", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, ease: "power4.out" }, 1.05);
          tl.fromTo("#sh-bar", { opacity: 0 }, { opacity: 1, duration: 0.4 }, 1.5);
          tl.fromTo("#sh-bar-fill", { scaleX: 0 }, { scaleX: 1, duration: 1.3, ease: "power2.inOut" }, 1.6);
          tl.fromTo("#sh-index", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 1.6);
          tl.fromTo("#sh-panel-ring", { scale: 1 }, { scale: 1.05, duration: 3.0, ease: "sine.inOut", repeat: 1, yoyo: true }, 1.8);
          window.__timelines["scla-stat"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
