<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>SCLA Lesson System — Demo Reel</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-400.woff2") format("woff2"); font-weight: 400; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-700.woff2") format("woff2"); font-weight: 700; font-style: normal; }
        @font-face { font-family: "proxima-nova"; src: url("assets/fonts/proxima-nova-900.woff2") format("woff2"); font-weight: 900; font-style: normal; }
      </style>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a1e2f;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      /* Sub-comp slots stretch to fill the root. */
      #root > div[data-composition-src] {
        position: absolute;
        inset: 0;
      }
      /* Host-root progress rail (frame.md → "Host-root progress rail") — spans the whole
         runtime, above the scenes. A completion indicator, not scene motion. */
      #hf-rail-track {
        position: absolute; left: 120px; right: 120px; bottom: 40px; height: 4px;
        background: rgba(204, 206, 223, 0.35); border-radius: 100px; z-index: 50;
      }
      #hf-rail-fill {
        position: absolute; left: 120px; right: 120px; bottom: 40px; height: 4px;
        background: #eaab2d; border-radius: 100px; z-index: 51;
        transform-origin: left center; transform: scaleX(0);
      }
    </style>
  </head>
  <body>
    <!--
      SCLA Lesson System — demo reel.
      The reusable scene templates in sequence, filled with illustrative content from
      the Early Career Boost lesson "Better Decisions Come From Better Criteria", plus
      the host-root progress rail. This file is the living style guide — render it after
      any template change.
      It is NOT the timing pattern to copy for lesson builds: it predates the anchor
      contract (numeric cues, no data-anchor-end / data-cue-anchors, no <audio> at
      root). For a production build, copy the most recent lesson build's index.html
      (anchors only — compile_timeline.py owns every number; /produce-video Steps 2–5).
      Design tokens: frame.md.

      Patterns this reel demonstrates (frame.md → animacy + pacing rules):
        • the program thesis is a STATEMENT (scla-statement), not a quote; the quote card
          (scla-quote) is reserved for a NAMED person's words;
        • lists reveal one item per cue — pointCues / stepCues / chipCues
          carry local-second times that in production come from transcript.json;
        • list variety — the same lesson rotates a numbered build (scla-points), a chip
          cluster (scla-chips), and a traced comparison map (scla-career-map).
    -->
    <div id="root" data-composition-id="main" data-start="0" data-width="1920" data-height="1080" data-duration="98">
      <div
        id="el-title"
        data-composition-id="scla-title"
        data-composition-src="compositions/scla-title.html"
        data-variable-values='{"eyebrow":"Early Career Boost","title":"Better Decisions Come From Better Criteria","meta":"3 min","sceneIndex":"01 / TITLE"}'
        data-start="0"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-points"
        data-composition-id="scla-points"
        data-composition-src="compositions/scla-points.html"
        data-variable-values='{"label":"Why decisions feel hard","heading":"Four pressure traps","point1":"Deciding under pressure","point2":"Comparing yourself to others","point3":"Fixating on one factor, like salary or prestige","point4":"Staying the course only because of sunk costs","sceneIndex":"02 / KEY POINTS","pointCues":"0.9,2.4,3.9,5.4"}'
        data-start="8"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-statement"
        data-composition-id="scla-statement"
        data-composition-src="compositions/scla-statement.html"
        data-variable-values='{"kicker":"The shift","statement":"Better decisions become possible when you shift from pressure to process.","sceneIndex":"03 / STATEMENT"}'
        data-start="16"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-chips"
        data-composition-id="scla-chips"
        data-composition-src="compositions/scla-chips.html"
        data-variable-values='{"label":"Step 1 — Define success","heading":"What matters most, the next 3–5 years?","chips":"Learning,Security,Income,Flexibility,Meaning,Mentorship,Growth","chipCues":"1.4,2.1,2.8,3.5,4.2,4.9,5.6","accentIndex":"5","reveal":"pop","sceneIndex":"04 / DEFINE"}'
        data-start="24"
        data-duration="10"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-steps"
        data-composition-id="scla-steps"
        data-composition-src="compositions/scla-steps.html"
        data-variable-values='{"label":"The process","heading":"Four moves, in order","step1":"Define success for the next 3–5 years","step2":"Broaden your options","step3":"Compare with your criteria","step4":"Notice what you still don&#39;t know","sceneIndex":"05 / PROCESS","stepCues":"1.2,2.6,4.0,5.4"}'
        data-start="34"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-career-map"
        data-composition-id="scla-career-map"
        data-composition-src="compositions/scla-career-map.html"
        data-variable-values='{"label":"Step 3 — Compare","heading":"Which one fits what matters to you?","path1":"Path A","fit1":"Fits 2 of 5","path2":"Path B","fit2":"Fits 4 of 5","path3":"Path C","fit3":"Fits 1 of 5","winner":"2","mapCue":"6.0","sceneIndex":"06 / COMPARE"}'
        data-start="42"
        data-duration="12"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-quote"
        data-composition-id="scla-quote"
        data-composition-src="compositions/scla-quote.html"
        data-variable-values='{"quote":"I picked my criteria before I compared a single option — that one change made the whole decision easier.","speaker":"Alex Rivera","speakerRole":"Illustrative placeholder — replace with a real attributed quote","sceneIndex":"07 / QUOTE"}'
        data-start="54"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-stat"
        data-composition-id="scla-stat"
        data-composition-src="compositions/scla-stat.html"
        data-variable-values='{"value":5,"prefix":"","suffix":"","statLabel":"Years your criteria should cover","context":"Define what success means for the next three to five years — then judge every option against that, not against whatever sounds impressive today.","sceneIndex":"08 / STAT"}'
        data-start="62"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-condition"
        data-composition-id="scla-condition"
        data-composition-src="compositions/scla-condition.html"
        data-variable-values='{"num":"1","kicker":"Criterion one","heading":"Work you can grow in","total":"5","chips":"Learning,Real feedback,Room to stretch","chipCues":"2.4,3.6,4.8","icon":"growth","sceneIndex":"09 / CRITERION"}'
        data-start="70"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-morph"
        data-composition-id="scla-morph"
        data-composition-src="compositions/scla-morph.html"
        data-variable-values='{"kicker":"Flip the order","aTitle":"Pick the destination","aSub":"choose the job first","bTitle":"Get clear on good work","bSub":"define what you optimize for","winner":"b","winnerAfter":"Clarity first, destination second","actions":"A,B,morph,note,note","notes":"The options stop looking equally scary|They start sorting themselves out","pointCues":"1.6,3.2,5.2,8.0,10.4","sceneIndex":"10 / FLIP"}'
        data-start="78"
        data-duration="12"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-outro"
        data-composition-id="scla-outro"
        data-composition-src="compositions/scla-outro.html"
        data-variable-values='{"cta":"Open your career map","next":"Use your criteria to compare real paths — not just the loudest option.","url":"thescla.org","sceneIndex":"11 / NEXT STEP"}'
        data-start="90"
        data-duration="8"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div id="hf-rail-track"></div>
      <div id="hf-rail-fill"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      // Root timeline drives ONLY the host-root progress rail (scene motion lives in the
      // sub-compositions). Its span is read from the root's data-duration at load, so the
      // rail stays proportional and deterministic — no hand-typed total, no clock.
      (function () {
        var root = document.getElementById("root");
        var total = parseFloat(root.getAttribute("data-duration")) || 1;
        var tl = gsap.timeline({ paused: true });
        tl.fromTo("#hf-rail-fill", { scaleX: 0 }, { scaleX: 1, duration: total, ease: "none" }, 0);
        window.__timelines["main"] = tl;
      })();
    </script>
  </body>
</html>
